<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Move Helper - Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* Filter row */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:600;border:1.5px solid #334155;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.filter-chip.active{border-color:var(--blue);color:var(--blue-pale);background:rgba(37,99,235,.15)}

/* Category colors */
.cat-utilities{border-left:3px solid #eab308}
.cat-packing{border-left:3px solid #8b5cf6}
.cat-paperwork{border-left:3px solid #06b6d4}
.cat-moving-day{border-left:3px solid var(--coral)}
.cat-other{border-left:3px solid var(--text-muted)}

/* Event cards */
.event-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .15s}
.event-card.completed{opacity:.5}
.event-card.completed .event-title{text-decoration:line-through}
.event-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--blue);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.event-check.checked{background:var(--success);border-color:var(--success)}
.event-check.checked::after{content:'';display:block;width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.event-body{flex:1;cursor:pointer}
.event-title{font-size:.95rem;font-weight:500}
.event-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.event-date{font-size:.75rem;color:var(--text-muted)}
.event-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-upcoming{background:rgba(37,99,235,.2);color:var(--blue-pale)}
.badge-soon{background:rgba(249,115,22,.2);color:var(--coral-light)}
.badge-overdue{background:rgba(239,68,68,.2);color:#fca5a5}
.badge-nodate{background:rgba(136,153,170,.15);color:var(--text-muted)}
.event-cat{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px}
.cat-tag-utilities{background:rgba(234,179,8,.15);color:#fde047}
.cat-tag-packing{background:rgba(139,92,246,.15);color:#c4b5fd}
.cat-tag-paperwork{background:rgba(6,182,212,.15);color:#67e8f9}
.cat-tag-moving-day{background:rgba(249,115,22,.15);color:var(--coral-light)}
.cat-tag-other{background:rgba(136,153,170,.15);color:var(--text-muted)}
.event-delete{background:none;border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;padding:4px 8px}
.event-delete:active{color:var(--danger)}

.add-btn{display:block;width:100%;padding:12px;margin-top:8px;text-align:center}
</style>
</head>
<body>

<h1>Moving Timeline</h1>
<p class="subtitle">Key dates & deadlines</p>

<div class="filter-row">
  <button class="filter-chip active" data-cat="all" onclick="setFilter('all')">All</button>
  <button class="filter-chip" data-cat="Utilities" onclick="setFilter('Utilities')">Utilities</button>
  <button class="filter-chip" data-cat="Packing" onclick="setFilter('Packing')">Packing</button>
  <button class="filter-chip" data-cat="Paperwork" onclick="setFilter('Paperwork')">Paperwork</button>
  <button class="filter-chip" data-cat="Moving Day" onclick="setFilter('Moving Day')">Moving Day</button>
  <button class="filter-chip" data-cat="Other" onclick="setFilter('Other')">Other</button>
</div>

<div id="eventList"></div>
<div class="empty-state" id="emptyState" style="display:none">No events yet. Add one below!</div>

<button class="btn btn-coral add-btn" onclick="openAddModal()">+ Add Event</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h2 id="modalTitle">Add Event</h2>
    <div class="form-group">
      <label>Title</label>
      <div class="input-with-mic">
        <input type="text" id="eventTitleInput" placeholder="What needs to happen?">
        <button class="mic-btn" onclick="voiceDictate(this,'eventTitleInput')">&#127908;</button>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="eventDateInput">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="eventCatInput">
        <option>Utilities</option>
        <option>Packing</option>
        <option>Paperwork</option>
        <option>Moving Day</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <div class="input-with-mic">
        <textarea id="eventNotesInput" placeholder="Optional details..."></textarea>
        <button class="mic-btn" onclick="voiceDictate(this,'eventNotesInput')">&#127908;</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('eventModal')">Cancel</button>
      <button class="btn btn-blue btn-sm" id="saveBtn" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a href="index.html"><span class="nav-icon">&#9776;</span>Lists</a>
  <a href="timeline.html" class="active"><span class="nav-icon">&#128197;</span>Timeline</a>
  <a href="boxes.html"><span class="nav-icon">&#128230;</span>Boxes</a>
  <a href="budget.html"><span class="nav-icon">&#128176;</span>Budget</a>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script src="shared.js"></script>
<script>
let db;
let currentFilter = 'all';
let editingEventId = null;

async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  const saved = await loadFromIDB();
  if (saved) {
    db = new SQL.Database(new Uint8Array(saved));
  } else {
    db = new SQL.Database();
    db.run(`CREATE TABLE IF NOT EXISTS timeline_events (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT NOT NULL, event_date TEXT NOT NULL, category TEXT DEFAULT 'Other', completed INTEGER DEFAULT 0, notes TEXT DEFAULT '', created_at TEXT DEFAULT (datetime('now')))`);
  }
  loadEvents();
}

function loadEvents() {
  let sql = 'SELECT id, title, event_date, category, completed, notes FROM timeline_events';
  const params = [];
  if (currentFilter !== 'all') {
    sql += ' WHERE category = ?';
    params.push(currentFilter);
  }
  sql += ' ORDER BY completed, CASE WHEN event_date = "" THEN 1 ELSE 0 END, event_date, id';
  const rows = db.exec(sql, params);
  const container = document.getElementById('eventList');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  if (!rows.length || !rows[0].values.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  rows[0].values.forEach(([id, title, event_date, category, completed, notes]) => {
    const catClass = 'cat-' + category.toLowerCase().replace(/\s+/g, '-');
    const catTagClass = 'cat-tag-' + category.toLowerCase().replace(/\s+/g, '-');
    const badge = getDateBadge(event_date, completed);
    const card = document.createElement('div');
    card.className = `event-card ${catClass} ${completed ? 'completed' : ''}`;
    card.innerHTML = `
      <div class="event-check ${completed ? 'checked' : ''}" onclick="toggleEvent(${id}, ${completed ? 0 : 1})"></div>
      <div class="event-body" onclick="openEditModal(${id})">
        <div class="event-title">${esc(title)}</div>
        <div class="event-meta">
          ${event_date ? `<span class="event-date">${formatDate(event_date)}</span>` : ''}
          ${badge}
          <span class="event-cat ${catTagClass}">${esc(category)}</span>
        </div>
        ${notes ? `<div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">${esc(notes)}</div>` : ''}
      </div>
      <button class="event-delete" onclick="deleteEvent(${id})">&#10005;</button>
    `;
    container.appendChild(card);
  });
}

function getDateBadge(dateStr, completed) {
  if (completed) return '';
  if (!dateStr) return '<span class="event-badge badge-nodate">No date</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.ceil((d - today) / 86400000);
  if (diff < 0) return `<span class="event-badge badge-overdue">${Math.abs(diff)}d overdue</span>`;
  if (diff === 0) return '<span class="event-badge badge-overdue">Today!</span>';
  if (diff <= 3) return `<span class="event-badge badge-soon">In ${diff}d</span>`;
  if (diff <= 14) return `<span class="event-badge badge-upcoming">In ${diff}d</span>`;
  return '';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  loadEvents();
}

function openAddModal() {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'Add Event';
  document.getElementById('eventTitleInput').value = '';
  document.getElementById('eventDateInput').value = '';
  document.getElementById('eventCatInput').value = 'Other';
  document.getElementById('eventNotesInput').value = '';
  document.getElementById('eventModal').classList.add('active');
}

function openEditModal(id) {
  editingEventId = id;
  const rows = db.exec('SELECT title, event_date, category, notes FROM timeline_events WHERE id = ?', [id]);
  if (!rows.length) return;
  const [title, event_date, category, notes] = rows[0].values[0];
  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('eventTitleInput').value = title;
  document.getElementById('eventDateInput').value = event_date || '';
  document.getElementById('eventCatInput').value = category;
  document.getElementById('eventNotesInput').value = notes || '';
  document.getElementById('eventModal').classList.add('active');
}

function saveEvent() {
  const title = document.getElementById('eventTitleInput').value.trim();
  if (!title) return;
  const date = document.getElementById('eventDateInput').value;
  const cat = document.getElementById('eventCatInput').value;
  const notes = document.getElementById('eventNotesInput').value.trim();
  if (editingEventId) {
    db.run('UPDATE timeline_events SET title=?, event_date=?, category=?, notes=? WHERE id=?', [title, date, cat, notes, editingEventId]);
    toast('Event updated');
  } else {
    db.run('INSERT INTO timeline_events (title, event_date, category, notes) VALUES (?,?,?,?)', [title, date, cat, notes]);
    toast('Event added');
  }
  persistDB();
  closeModal('eventModal');
  loadEvents();
}

function toggleEvent(id, val) {
  db.run('UPDATE timeline_events SET completed = ? WHERE id = ?', [val, id]);
  persistDB();
  loadEvents();
}

function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  db.run('DELETE FROM timeline_events WHERE id = ?', [id]);
  persistDB();
  loadEvents();
  toast('Event deleted');
}

init();
</script>
</body>
</html>
