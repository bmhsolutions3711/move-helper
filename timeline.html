<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>Move Helper - Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue:#2563eb;--blue-dark:#1e40af;--blue-light:#3b82f6;--blue-pale:#93c5fd;
  --coral:#f97316;--coral-dark:#ea580c;--coral-light:#fb923c;
  --bg:#0f1720;--bg-card:#1a2535;--bg-card-hover:#223344;
  --text:#e8edf2;--text-muted:#8899aa;
  --success:#22c55e;--danger:#ef4444;
  --radius:14px;--radius-sm:8px;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);max-width:480px;margin:0 auto;padding:0 16px 120px;min-height:100vh;-webkit-tap-highlight-color:transparent}
h1{text-align:center;font-size:1.6rem;font-weight:800;color:var(--blue-pale);margin:20px 0 4px}
.subtitle{text-align:center;color:var(--text-muted);font-size:.85rem;margin-bottom:16px}

.btn{padding:10px 16px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .15s}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:active{background:var(--blue-dark)}
.btn-coral{background:var(--coral);color:#fff}.btn-coral:active{background:var(--coral-dark)}
.btn-outline{background:transparent;border:1.5px solid var(--blue);color:var(--blue-pale)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 12px;font-size:.8rem}

/* Filter row */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.filter-chip{padding:6px 12px;border-radius:20px;font-size:.75rem;font-weight:600;border:1.5px solid #334155;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.filter-chip.active{border-color:var(--blue);color:var(--blue-pale);background:rgba(37,99,235,.15)}

/* Category colors */
.cat-utilities{border-left:3px solid #eab308}
.cat-packing{border-left:3px solid #8b5cf6}
.cat-paperwork{border-left:3px solid #06b6d4}
.cat-moving-day{border-left:3px solid var(--coral)}
.cat-other{border-left:3px solid var(--text-muted)}

/* Event cards */
.event-card{background:var(--bg-card);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .15s}
.event-card.completed{opacity:.5}
.event-card.completed .event-title{text-decoration:line-through}
.event-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--blue);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.event-check.checked{background:var(--success);border-color:var(--success)}
.event-check.checked::after{content:'';display:block;width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.event-body{flex:1;cursor:pointer}
.event-title{font-size:.95rem;font-weight:500}
.event-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.event-date{font-size:.75rem;color:var(--text-muted)}
.event-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-upcoming{background:rgba(37,99,235,.2);color:var(--blue-pale)}
.badge-soon{background:rgba(249,115,22,.2);color:var(--coral-light)}
.badge-overdue{background:rgba(239,68,68,.2);color:#fca5a5}
.badge-nodate{background:rgba(136,153,170,.15);color:var(--text-muted)}
.event-cat{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px}
.cat-tag-utilities{background:rgba(234,179,8,.15);color:#fde047}
.cat-tag-packing{background:rgba(139,92,246,.15);color:#c4b5fd}
.cat-tag-paperwork{background:rgba(6,182,212,.15);color:#67e8f9}
.cat-tag-moving-day{background:rgba(249,115,22,.15);color:var(--coral-light)}
.cat-tag-other{background:rgba(136,153,170,.15);color:var(--text-muted)}
.event-delete{background:none;border:none;color:var(--text-muted);font-size:1.1rem;cursor:pointer;padding:4px 8px}
.event-delete:active{color:var(--danger)}

.add-btn{display:block;width:100%;padding:12px;margin-top:8px;text-align:center}

.empty-state{text-align:center;color:var(--text-muted);padding:40px 20px;font-size:.9rem}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-card);border-radius:var(--radius);padding:24px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:1.2rem;margin-bottom:16px;color:var(--blue-pale)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.8rem;color:var(--text-muted);margin-bottom:4px;font-weight:500}
.modal input,.modal select,.modal textarea{width:100%;background:#0f1720;color:var(--text);border:1px solid #334155;border-radius:var(--radius-sm);padding:10px 12px;font-size:.95rem;font-family:inherit}
.modal textarea{min-height:60px;resize:vertical}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0d131b;border-top:1px solid #1e293b;display:flex;padding:8px 0 env(safe-area-inset-bottom,8px);z-index:50}
.bottom-nav a{flex:1;text-align:center;text-decoration:none;color:var(--text-muted);font-size:.7rem;font-weight:600;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s}
.bottom-nav a.active{color:var(--blue-pale)}
.bottom-nav a .nav-icon{font-size:1.3rem}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

/* Voice mic button */
.mic-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--blue);background:var(--bg-card);color:var(--blue-pale);font-size:1rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mic-btn:active{background:var(--blue-dark)}
.mic-btn.recording{border-color:var(--danger);background:rgba(239,68,68,.15);color:#fca5a5;animation:mic-pulse 1.2s ease-in-out infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.3)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}
.input-with-mic{display:flex;gap:6px;align-items:center}
.input-with-mic input,.input-with-mic textarea{flex:1}
</style>
</head>
<body>

<h1>Moving Timeline</h1>
<p class="subtitle">Key dates & deadlines</p>

<div class="filter-row">
  <button class="filter-chip active" data-cat="all" onclick="setFilter('all')">All</button>
  <button class="filter-chip" data-cat="Utilities" onclick="setFilter('Utilities')">Utilities</button>
  <button class="filter-chip" data-cat="Packing" onclick="setFilter('Packing')">Packing</button>
  <button class="filter-chip" data-cat="Paperwork" onclick="setFilter('Paperwork')">Paperwork</button>
  <button class="filter-chip" data-cat="Moving Day" onclick="setFilter('Moving Day')">Moving Day</button>
  <button class="filter-chip" data-cat="Other" onclick="setFilter('Other')">Other</button>
</div>

<div id="eventList"></div>
<div class="empty-state" id="emptyState" style="display:none">No events yet. Add one below!</div>

<button class="btn btn-coral add-btn" onclick="openAddModal()">+ Add Event</button>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h2 id="modalTitle">Add Event</h2>
    <div class="form-group">
      <label>Title</label>
      <div class="input-with-mic">
        <input type="text" id="eventTitleInput" placeholder="What needs to happen?">
        <button class="mic-btn" onclick="voiceDictate(this,'eventTitleInput')">&#127908;</button>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="eventDateInput">
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="eventCatInput">
        <option>Utilities</option>
        <option>Packing</option>
        <option>Paperwork</option>
        <option>Moving Day</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <div class="input-with-mic">
        <textarea id="eventNotesInput" placeholder="Optional details..."></textarea>
        <button class="mic-btn" onclick="voiceDictate(this,'eventNotesInput')">&#127908;</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('eventModal')">Cancel</button>
      <button class="btn btn-blue btn-sm" id="saveBtn" onclick="saveEvent()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <a href="index.html"><span class="nav-icon">&#9776;</span>Lists</a>
  <a href="timeline.html" class="active"><span class="nav-icon">&#128197;</span>Timeline</a>
  <a href="boxes.html"><span class="nav-icon">&#128230;</span>Boxes</a>
  <a href="budget.html"><span class="nav-icon">&#128176;</span>Budget</a>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script>
let db;
let currentFilter = 'all';
let editingEventId = null;
const IDB_NAME = 'MoveHelperStore';
const IDB_STORE = 'meta';
const DB_KEY = 'move-helper-db';

async function init() {
  const SQL = await initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}` });
  const saved = await loadFromIDB();
  if (saved) {
    db = new SQL.Database(new Uint8Array(saved));
  } else {
    db = new SQL.Database();
    db.run(`CREATE TABLE IF NOT EXISTS timeline_events (id INTEGER PRIMARY KEY AUTOINCREMENT, title TEXT NOT NULL, event_date TEXT NOT NULL, category TEXT DEFAULT 'Other', completed INTEGER DEFAULT 0, notes TEXT DEFAULT '', created_at TEXT DEFAULT (datetime('now')))`);
  }
  loadEvents();
}

function loadEvents() {
  let sql = 'SELECT id, title, event_date, category, completed, notes FROM timeline_events';
  const params = [];
  if (currentFilter !== 'all') {
    sql += ' WHERE category = ?';
    params.push(currentFilter);
  }
  sql += ' ORDER BY completed, CASE WHEN event_date = "" THEN 1 ELSE 0 END, event_date, id';
  const rows = db.exec(sql, params);
  const container = document.getElementById('eventList');
  const empty = document.getElementById('emptyState');
  container.innerHTML = '';
  if (!rows.length || !rows[0].values.length) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  rows[0].values.forEach(([id, title, event_date, category, completed, notes]) => {
    const catClass = 'cat-' + category.toLowerCase().replace(/\s+/g, '-');
    const catTagClass = 'cat-tag-' + category.toLowerCase().replace(/\s+/g, '-');
    const badge = getDateBadge(event_date, completed);
    const card = document.createElement('div');
    card.className = `event-card ${catClass} ${completed ? 'completed' : ''}`;
    card.innerHTML = `
      <div class="event-check ${completed ? 'checked' : ''}" onclick="toggleEvent(${id}, ${completed ? 0 : 1})"></div>
      <div class="event-body" onclick="openEditModal(${id})">
        <div class="event-title">${esc(title)}</div>
        <div class="event-meta">
          ${event_date ? `<span class="event-date">${formatDate(event_date)}</span>` : ''}
          ${badge}
          <span class="event-cat ${catTagClass}">${esc(category)}</span>
        </div>
        ${notes ? `<div style="font-size:.75rem;color:var(--text-muted);margin-top:4px">${esc(notes)}</div>` : ''}
      </div>
      <button class="event-delete" onclick="deleteEvent(${id})">&#10005;</button>
    `;
    container.appendChild(card);
  });
}

function getDateBadge(dateStr, completed) {
  if (completed) return '';
  if (!dateStr) return '<span class="event-badge badge-nodate">No date</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.ceil((d - today) / 86400000);
  if (diff < 0) return `<span class="event-badge badge-overdue">${Math.abs(diff)}d overdue</span>`;
  if (diff === 0) return '<span class="event-badge badge-overdue">Today!</span>';
  if (diff <= 3) return `<span class="event-badge badge-soon">In ${diff}d</span>`;
  if (diff <= 14) return `<span class="event-badge badge-upcoming">In ${diff}d</span>`;
  return '';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function setFilter(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat));
  loadEvents();
}

function openAddModal() {
  editingEventId = null;
  document.getElementById('modalTitle').textContent = 'Add Event';
  document.getElementById('eventTitleInput').value = '';
  document.getElementById('eventDateInput').value = '';
  document.getElementById('eventCatInput').value = 'Other';
  document.getElementById('eventNotesInput').value = '';
  document.getElementById('eventModal').classList.add('active');
}

function openEditModal(id) {
  editingEventId = id;
  const rows = db.exec('SELECT title, event_date, category, notes FROM timeline_events WHERE id = ?', [id]);
  if (!rows.length) return;
  const [title, event_date, category, notes] = rows[0].values[0];
  document.getElementById('modalTitle').textContent = 'Edit Event';
  document.getElementById('eventTitleInput').value = title;
  document.getElementById('eventDateInput').value = event_date || '';
  document.getElementById('eventCatInput').value = category;
  document.getElementById('eventNotesInput').value = notes || '';
  document.getElementById('eventModal').classList.add('active');
}

function saveEvent() {
  const title = document.getElementById('eventTitleInput').value.trim();
  if (!title) return;
  const date = document.getElementById('eventDateInput').value;
  const cat = document.getElementById('eventCatInput').value;
  const notes = document.getElementById('eventNotesInput').value.trim();
  if (editingEventId) {
    db.run('UPDATE timeline_events SET title=?, event_date=?, category=?, notes=? WHERE id=?', [title, date, cat, notes, editingEventId]);
    toast('Event updated');
  } else {
    db.run('INSERT INTO timeline_events (title, event_date, category, notes) VALUES (?,?,?,?)', [title, date, cat, notes]);
    toast('Event added');
  }
  persistDB();
  closeModal('eventModal');
  loadEvents();
}

function toggleEvent(id, val) {
  db.run('UPDATE timeline_events SET completed = ? WHERE id = ?', [val, id]);
  persistDB();
  loadEvents();
}

function deleteEvent(id) {
  if (!confirm('Delete this event?')) return;
  db.run('DELETE FROM timeline_events WHERE id = ?', [id]);
  persistDB();
  loadEvents();
  toast('Event deleted');
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function openIDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 2);
    req.onupgradeneeded = (e) => {
      const idb = req.result;
      if (!idb.objectStoreNames.contains(IDB_STORE)) idb.createObjectStore(IDB_STORE);
      if (!idb.objectStoreNames.contains('blobs')) idb.createObjectStore('blobs');
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function persistDB() {
  const data = db.export();
  const idb = await openIDB();
  const tx = idb.transaction(IDB_STORE, 'readwrite');
  tx.objectStore(IDB_STORE).put(data.buffer, DB_KEY);
}
async function loadFromIDB() {
  try {
    const idb = await openIDB();
    return new Promise((resolve) => {
      const tx = idb.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(DB_KEY);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

// Voice dictation
let activeRecognition = null;
let activeBtn = null;
function voiceDictate(btn, inputId) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Voice not supported in this browser'); return; }
  if (activeBtn === btn) { stopDictation(); return; }
  if (activeRecognition) stopDictation();
  const input = document.getElementById(inputId);
  if (!input) return;
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = true;
  rec.lang = 'en-US';
  const startVal = input.value;
  btn.classList.add('recording');
  activeRecognition = rec;
  activeBtn = btn;
  rec.onresult = (e) => {
    const result = e.results[0];
    const text = result[0].transcript;
    input.value = startVal + (startVal ? ' ' : '') + text;
    if (result.isFinal) stopDictation();
  };
  rec.onerror = (e) => { if (e.error !== 'aborted' && e.error !== 'no-speech') toast('Voice error: ' + e.error); stopDictation(); };
  rec.onend = () => { if (activeBtn === btn) stopDictation(); };
  rec.start();
}
function stopDictation() {
  if (activeRecognition) { try { activeRecognition.stop(); } catch(e){} activeRecognition = null; }
  if (activeBtn) { activeBtn.classList.remove('recording'); activeBtn = null; }
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
init();
</script>
</body>
</html>
